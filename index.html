<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStock Manager</title>
    <style>
        /* General Styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        /* Form Styles */
        .input-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 200px;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .btn-add {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background-color: #219150;
        }

        /* Table Styles */
        .table-container {
            overflow-x: auto;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f4f4f4;
            font-weight: bold;
        }

        /* Stock Status Styles */
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .status-in-stock {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        .status-low-stock {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        .row-low-stock {
            background-color: #fff5f5;
        }

        /* Action Styles */
        .btn-delete {
            background-color: #eb4d4b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-delete:hover {
            background-color: #d63031;
        }

        /* Summary Section */
        .summary-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .summary-card {
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            background: #f8f9fa;
            border: 1px solid #eee;
        }

        .summary-card h3 {
            margin: 0;
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
        }

        .summary-card p {
            margin: 10px 0 0 0;
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
        }

        /* Responsive Tweaks */
        @media (max-width: 600px) {
            .input-section {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-add {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SmartStock Manager</h1>

    <!-- Input Form -->
    <div class="input-section">
        <div class="input-group">
            <label for="prodName">Product Name</label>
            <input type="text" id="prodName" placeholder="e.g. Organic Apples">
        </div>
        <div class="input-group">
            <label for="currStock">Current Stock</label>
            <input type="number" id="currStock" placeholder="0">
        </div>
        <div class="input-group">
            <label for="minStock">Min. Level</label>
            <input type="number" id="minStock" placeholder="5">
        </div>
        <button class="btn-add" onclick="addProduct()">Add Product</button>
    </div>

    <!-- Product Table -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Current Stock</th>
                    <th>Min. Level</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                <!-- Products will appear here -->
            </tbody>
        </table>
    </div>

    <!-- Summary Section -->
    <div class="summary-section">
        <div class="summary-card">
            <h3>Total Products</h3>
            <p id="totalItems">0</p>
        </div>
        <div class="summary-card">
            <h3>Low Stock Items</h3>
            <p id="lowStockCount" style="color: #c62828;">0</p>
        </div>
        <div class="summary-card">
            <h3>Healthy Stock</h3>
            <p id="healthyStockCount" style="color: #2e7d32;">0</p>
        </div>
    </div>
</div>

<script>
    // Initial data (Empty array)
    let inventory = JSON.parse(localStorage.getItem('myInventory')) || [];

    // Function to add a product
    function addProduct() {
        const nameInput = document.getElementById('prodName');
        const stockInput = document.getElementById('currStock');
        const minInput = document.getElementById('minStock');

        // Simple validation
        if (nameInput.value === '' || stockInput.value === '' || minInput.value === '') {
            alert("Please fill in all fields");
            return;
        }

        const product = {
            id: Date.now(),
            name: nameInput.value,
            stock: parseInt(stockInput.value),
            minStock: parseInt(minInput.value)
        };

        inventory.push(product);
        saveAndRender();

        // Clear inputs
        nameInput.value = '';
        stockInput.value = '';
        minInput.value = '';
        nameInput.focus();
    }

    // Function to delete a product
    function deleteProduct(id) {
        inventory = inventory.filter(item => item.id !== id);
        saveAndRender();
    }

    // Save to local storage and update screen
    function saveAndRender() {
        localStorage.setItem('myInventory', JSON.stringify(inventory));
        renderTable();
        updateSummary();
    }

    // Build the table rows
    function renderTable() {
        const tbody = document.getElementById('inventoryBody');
        tbody.innerHTML = '';

        inventory.forEach(item => {
            const isLow = item.stock < item.minStock;
            const rowClass = isLow ? 'row-low-stock' : '';
            const statusText = isLow ? 'Low Stock' : 'In Stock';
            const statusClass = isLow ? 'status-low-stock' : 'status-in-stock';

            const row = `
                <tr class="${rowClass}">
                    <td>${item.name}</td>
                    <td>${item.stock}</td>
                    <td>${item.minStock}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td><button class="btn-delete" onclick="deleteProduct(${item.id})">Delete</button></td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    // Update the summary cards
    function updateSummary() {
        const totalItems = inventory.length;
        const lowStockCount = inventory.filter(item => item.stock < item.minStock).length;
        const healthyCount = totalItems - lowStockCount;

        document.getElementById('totalItems').innerText = totalItems;
        document.getElementById('lowStockCount').innerText = lowStockCount;
        document.getElementById('healthyStockCount').innerText = healthyCount;
    }

    // Load data on start
    renderTable();
    updateSummary();
</script>

</body>
          </html>
